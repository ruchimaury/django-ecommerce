<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">RuchiStore</a>

   </div>
</nav>


<div class="container mt-4">

    <h2 class="mb-4">Products</h2>


    <div class="row row-cols-1 row-cols-md-3 g-4">

        {% for p in products %}
        <div class="col">
            <div class="card h-100">

    <img src="{{ p.image }}" class="card-img-top" alt="product">

    <div class="card-body">
        <h5 class="card-title">{{ p.name }}</h5>
        <p class="card-text">Price: ₹{{ p.price }}</p>

        <form method="POST" action="/buy/">
            {% csrf_token %}

            <input type="hidden" name="name" value="{{ p.name }}">
            <input type="hidden" name="price" value="{{ p.price }}">

            <input type="number" name="qty" value="1" min="1" class="form-control mb-2">

            <button class="btn btn-primary w-100">Buy</button>
        </form>



                </div>

            </div>
        </div>
        {% endfor %}

    </div>

    <hr class="my-4">

    <h3>My Orders</h3>


    <ul class="list-group">
        {% for order in orders %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ order.product_name }} (x{{ order.quantity }})
            <span class="badge bg-success">Paid</span>
        </li>
        {% empty %}
        <li class="list-group-item">No orders yet</li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
